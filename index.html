<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyAI</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef3ff;
}

header{
background:#2563eb;
color:white;
padding:30px;
text-align:center;
}

.card{
background:white;
max-width:600px;
margin:40px auto;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

input{
width:90%;
padding:15px;
font-size:18px;
border-radius:10px;
border:2px solid #2563eb;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#antwort{
margin-top:30px;
text-align:left;
}
</style>

</head>
<body>

<header>
<h1>🤖 StudyAI</h1>
<p>Dein KI-Lernassistent</p>
</header>

<div class="card">

<h2>Was möchtest du lernen?</h2>

<input id="thema" placeholder="z.B. Photosynthese">

<br>

<button onclick="lernen()">
Lernkarten erstellen
</button>

<div id="antwort"></div>

</div>

<script>

function lernen(){

let thema=document.getElementById("thema").value.trim();

if(thema==""){
alert("Bitte ein Thema eingeben.");
return;
}

document.getElementById("antwort").innerHTML=`

<h2>📚 Lernkarten</h2>

<p><b>1.</b> Was ist ${thema}?</p>

<p><b>2.</b> Wie funktioniert ${thema}?</p>

<p><b>3.</b> Warum ist ${thema} wichtig?</p>

<p><b>4.</b> Welche Beispiele gibt es für ${thema}?</p>

<p><b>5.</b> Welche Vor- und Nachteile hat ${thema}?</p>

`;

}

</script>

</body>
</html>
<script>

function createCards(){

let topic=document.getElementById("topic").value;

if(topic==""){

alert("Bitte gib zuerst ein Thema ein.");

return;

}

document.getElementById("output").innerHTML=`

<h2>📖 Deine Lernkarten</h2>

<div class="flashcard">
<h3>❓ Was ist ${topic}?</h3>
<p>Beschreibe die wichtigsten Grundlagen von <b>${topic}</b>.</p>
</div>

<div class="flashcard">
<h3>🧠 Erkläre ${topic}</h3>
<p>Versuche das Thema mit deinen eigenen Worten zu erklären.</p>
</div>

<div class="flashcard">
<h3>⭐ Warum ist ${topic} wichtig?</h3>
<p>Nenne mindestens drei Gründe, warum <b>${topic}</b> wichtig ist.</p>
</div>

<div class="flashcard">
<h3>📝 Mini-Quiz</h3>
<p>Kannst du 5 Fakten über <b>${topic}</b> aufzählen, ohne nachzuschauen?</p>
</div>

`;

}

</script>

</body>
