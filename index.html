<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyAI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef4ff;
}

header{
background:linear-gradient(135deg,#2563eb,#4f8cff);
color:white;
padding:35px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

header h1{
font-size:42px;
}

header p{
margin-top:10px;
font-size:20px;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
margin-bottom:30px;
}

h2{
margin-bottom:20px;
text-align:center;
}

input{
width:100%;
padding:18px;
font-size:18px;
border-radius:12px;
border:2px solid #2563eb;
outline:none;
margin-bottom:20px;
}

button{
width:100%;
padding:18px;
font-size:18px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1749b9;
}

#output{
margin-top:30px;
}

.flashcard{
background:#f7f9ff;
border-left:6px solid #2563eb;
padding:20px;
margin-top:15px;
border-radius:12px;
}

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.feature{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.feature h3{
color:#2563eb;
margin-bottom:10px;
}

footer{
margin-top:50px;
padding:30px;
text-align:center;
color:#777;
}
</style>
</head>

<body>

<header>
<h1>🤖 StudyAI</h1>
<p>Dein persönlicher KI-Lernassistent</p>
</header>

<div class="container">

<div class="card">

<h2>📚 Lernkarten erstellen</h2>

<input id="topic" placeholder="z.B. Photosynthese">

<button onclick="createCards()">
Lernkarten erstellen
</button>

<div id="output"></div>

</div>

<div class="features">

<div class="feature">
<h3>📄 PDFs</h3>
<p>Bald kannst du PDFs hochladen.</p>
</div>

<div class="feature">
<h3>📝 Quiz</h3>
<p>Automatische Quizfragen.</p>
</div>

<div class="feature">
<h3>🎤 Sprache</h3>
<p>Mit Sprache lernen.</p>
</div>

<div class="feature">
<h3>🤖 KI</h3>
<p>Antworten mit künstlicher Intelligenz.</p>
</div>

</div>

<footer>
StudyAI © 2026
</footer>

</div>

<script>

function createCards(){

let topic=document.getElementById("topic").value;

if(topic==""){
alert("Bitte gib zuerst ein Thema ein.");
return;
}

document.getElementById("output").innerHTML=`

<h2>📖 Deine Lernkarten</h2>

<div class="flashcard">
<h3>❓ Was ist ${topic}?</h3>
<p>Beschreibe die wichtigsten Grundlagen von <b>${topic}</b>.</p>
</div>

<div class="flashcard">
<h3>🧠 Erkläre ${topic}</h3>
<p>Versuche das Thema mit deinen eigenen Worten zu erklären.</p>
</div>

<div class="flashcard">
<h3>⭐ Warum ist ${topic} wichtig?</h3>
<p>Nenne mindestens drei Gründe, warum <b>${topic}</b> wichtig ist.</p>
</div>

<div class="flashcard">
<h3>📝 Mini-Quiz</h3>
<p>Kannst du 5 Fakten über <b>${topic}</b> aufzählen, ohne nachzuschauen?</p>
</div>

`;

}

</script>

</body>
</html>
