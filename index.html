<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyAI</title>
<style>
body{font-family:Arial;margin:0;background:#eef4ff}
header{background:#2563eb;color:#fff;text-align:center;padding:25px}
main{max-width:700px;margin:30px auto;background:#fff;padding:20px;border-radius:15px;box-shadow:0 0 10px #ccc}
input{width:100%;padding:12px;font-size:18px;border-radius:10px;border:1px solid #999}
button{width:100%;margin-top:15px;padding:12px;background:#2563eb;color:white;border:none;border-radius:10px;font-size:18px;cursor:pointer}
.card{background:#f7f9ff;border-left:5px solid #2563eb;padding:15px;margin-top:15px;border-radius:10px}
</style>
</head>
<body>

<header>
<h1>🤖 StudyAI</h1>
<p>Dein kostenloser Lernassistent</p>
</header>

<main>

<input id="topic" placeholder="z.B. Photosynthese">

<button onclick="study()">Lernkarten erstellen</button>

<div id="output"></div>

</main>

<script>
function study(){

let t=document.getElementById("topic").value;

if(!t){
alert("Bitte Thema eingeben");
return;
}

document.getElementById("output").innerHTML=`

<div class="card">
<h3>📚 Was ist ${t}?</h3>
<p>Beschreibe ${t} mit deinen eigenen Worten.</p>
</div>

<div class="card">
<h3>🧠 Erklärung</h3>
<p>Wie funktioniert ${t}?</p>
</div>

<div class="card">
<h3>⭐ Wichtig</h3>
<p>Warum ist ${t} wichtig?</p>
</div>

<div class="card">
<h3>📝 Quiz</h3>
<p>Nenne 5 Fakten über ${t}.</p>
</div>

`;

}
</script>

</body>
</html>
