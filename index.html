<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FYKO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f5f5;
color:#111;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:white;
position:sticky;
top:0;
box-shadow:0 5px 15px rgba(0,0,0,.08);
z-index:100;
}

.logo{
font-size:30px;
font-weight:900;
letter-spacing:8px;
}

header div:last-child{
font-size:14px;
letter-spacing:2px;
color:#777;
}

.hero{
background:#111;
color:white;
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:90px;
letter-spacing:14px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
opacity:.8;
margin-bottom:40px;
}

.hero button{
padding:15px 35px;
border:none;
background:white;
color:black;
font-weight:bold;
border-radius:50px;
cursor:pointer;
}

.section{
padding:80px 20px;
text-align:center;
}

.title{
font-size:40px;
font-weight:900;
letter-spacing:6px;
margin-bottom:50px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.card{
background:white;
width:280px;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
border-radius:15px;
margin-bottom:20px;
}

.card h3{
margin-bottom:10px;
letter-spacing:2px;
}

.price{
font-size:22px;
font-weight:bold;
margin:15px 0;
}

button{
padding:12px 28px;
background:#111;
color:white;
border:none;
border-radius:40px;
cursor:pointer;
}

footer{
background:#111;
color:white;
text-align:center;
padding:40px;
margin-top:80px;
}

@media(max-width:768px){

header{
flex-direction:column;
gap:10px;
padding:20px;
}

.hero h1{
font-size:55px;
}

.products{
flex-direction:column;
align-items:center;
}

}

</style>

</head>

<body>

<header>

<div class="logo">FYKO</div>

<div>PREMIUM STREETWEAR</div>

</header>

<section class="hero">

<h1>FYKO</h1>

<p>BUILT DIFFERENT. MADE TO INSPIRE.</p>

<button>SHOP NOW</button>

</section>

<section class="section">

<h2 class="title">NEW DROP</h2>

<div class="products">
  <div class="card">

<img src="https://placehold.co/400x500?text=FYKO+CLASSIC" alt="Classic Tee">

<h3>CLASSIC TEE</h3>

<p>ESSENTIAL STREETWEAR</p>

<p class="price">30 CHF</p>

<button>BUY NOW</button>

</div>

<div class="card">

<img src="https://placehold.co/400x500?text=FYKO+OVERSIZED" alt="Oversized Tee">

<h3>OVERSIZED TEE</h3>

<p>BUILT DIFFERENT</p>

<p class="price">30 CHF</p>

<button>BUY NOW</button>

</div>

<div class="card">

<img src="https://placehold.co/400x500?text=FYKO+SIGNATURE" alt="Signature Tee">

<h3>SIGNATURE TEE</h3>

<p>FYKO WORLDWIDE</p>

<p class="price">30 CHF</p>

<button>BUY NOW</button>

</div>

</div>

</section>

<footer>

<h2 style="letter-spacing:8px;">FYKO</h2>

<br>

<p>© 2026 FYKO • PREMIUM STREETWEAR</p>

</footer>

</body>

</html>
