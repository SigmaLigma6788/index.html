<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FYKO</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;color:#111}
header{display:flex;justify-content:space-between;padding:20px 40px;background:#fff;position:sticky;top:0}
.logo{font-size:28px;font-weight:900;letter-spacing:6px}
.hero{background:#111;color:#fff;text-align:center;padding:120px 20px}
.hero h1{font-size:70px;letter-spacing:10px;margin:0}
.hero p{opacity:.8;margin:20px 0}
.hero button{padding:14px 30px;border:none;background:#fff;color:#111;border-radius:30px;font-weight:bold;cursor:pointer}
.section{text-align:center;padding:70px 20px}
.products{display:flex;justify-content:center;flex-wrap:wrap;gap:25px}
.card{background:#fff;padding:25px;width:250px;border-radius:18px;box-shadow:0 8px 20px rgba(0,0,0,.1)}
.card h3{margin:10px 0}
.price{font-size:22px;font-weight:bold}
.card button{padding:12px 25px;background:#111;color:#fff;border:none;border-radius:25px;cursor:pointer}
footer{background:#111;color:#fff;text-align:center;padding:35px;margin-top:60px}
@media(max-width:700px){
header{padding:20px}
.hero h1{font-size:50px}
}
</style>
</head>

<body>

<header>
<div class="logo">FYKO</div>
<div>PREMIUM STREETWEAR</div>
</header>

<section class="hero">
<h1>FYKO</h1>
<p>BUILT DIFFERENT. WEAR WITH CONFIDENCE.</p>
<button>SHOP NOW</button>
</section>

<section class="section">
<h2>NEW DROP</h2>

<div class="products">

<div class="card">
<h3>CLASSIC TEE</h3>
<p>ESSENTIAL COLLECTION</p>
<p class="price">20 CHF</p>
<button>BUY NOW</button>
</div>

<div class="card">
<h3>OVERSIZED TEE</h3>
<p>BUILT DIFFERENT</p>
<p class="price">20 CHF</p>
<button>BUY NOW</button>
</div>

<div class="card">
<h3>SIGNATURE TEE</h3>
<p>FYKO WORLDWIDE</p>
<p class="price">20 CHF</p>
<button>BUY NOW</button>
</div>

</div>
</section>

<footer>
<b>FYKO</b><br><br>
© 2026 FYKO • PREMIUM STREETWEAR
</footer>

</body>
</html>
